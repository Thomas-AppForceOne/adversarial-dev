services:

  # The harness container runs `claude -p` subprocesses for every agent turn.
  # Claude Code handles its own authentication using the credentials file we
  # mount read-only — so Anthropic sees legitimate Claude Code traffic and
  # token refresh happens inside the binary, for free.
  agent:
    build:
      context: .
    environment:
      # API-key mode: passthrough. Claude Code will prefer this over OAuth.
      # Empty string is treated as "not set" by Claude Code.
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      # Harness tuning knobs — forwarded from the host shell so users can
      # override defaults without editing code. All are optional.
      #   ADEV_TOOL_TIMEOUT_SEC   per-tool-call wall-clock timeout (default 900)
      #   ADEV_QUOTA_MAX_RETRIES  retries on hard quota exhaustion (default 3)
      #   ADEV_QUOTA_WAIT_MS      fallback wait between quota retries (default 5 min)
      ADEV_TOOL_TIMEOUT_SEC: "${ADEV_TOOL_TIMEOUT_SEC:-}"
      ADEV_QUOTA_MAX_RETRIES: "${ADEV_QUOTA_MAX_RETRIES:-}"
      ADEV_QUOTA_WAIT_MS: "${ADEV_QUOTA_WAIT_MS:-}"
    volumes:
      - "${PROJECT_DIR}:/project:rw"
      - "${WORKSPACE_DIR}:/harness/workspace:rw"
      # Subscription mode: Claude Code reads OAuth tokens from this file and
      # refreshes them in-place. We mount it read-write so refresh can write
      # the new token back; the file lives under ~/.adev on the host, NOT in
      # the Keychain itself, so refreshes here don't stomp on the host's own
      # Claude Code sessions.
      - "${CRED_FILE}:/home/bun/.claude/.credentials.json:rw"
    working_dir: /harness
    entrypoint: ["bun", "run"]
    # CMD / args are supplied by `docker compose run agent <harness> <args>`
